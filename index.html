<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casio</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="Calculette">

        <!-- Première partie -->

        <div class="interface">
            <div class="ensemble">
                <div class="titre">
                    <h1>Casio</h1>
                </div>
                <div class="rectangle"></div>
                <div class="titre2">
                    <p>MS-80E</p>
                </div>
            </div>
            <form>
                <input type="number" class="afficheur" size=50 style="height:56px;width:240px">
            </form>
        </div>

        <!-- Première partie -->

        <!-- Seconde partie -->

<div class="boutons">
            <div class="grid">

            <button>OFF</button>
            <button>+/-</button>
            <button>%</button>
            <button style="background-color: rgba(211, 211, 211, 0.603)">Local</button>
            <button style="background-color: rgba(211, 211, 211, 0.603);">Euro</button>

            </div>

            <div class="grid2">

            <button>MC</button>
            <button>MR</button>
            <button>M-</button>
            <button>M+</button>
            <button>/</button>
            <button>▶</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">7</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">8</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">9</button>
            <button>x</button>
            <button style="background-color: goldenrod;">C</button>
            <button style="background-color: rgba(0, 0, 0, 0.651);">4</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">5</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">6</button>
            <button>-</button>
            <button style="background-color: goldenrod;">AC</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">1</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">2</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">3</button>
            <button style="height: 7.3vh;">+</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">0</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">00</button>
            <button style="background-color: rgba(0, 0, 0, 0.651)">.</button>
            <button>=</button>

            </div>

        </div>

            <!-- Seconde partie -->

    </div>

</body>
</html>
