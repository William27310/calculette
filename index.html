<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casio</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="Calculette">

        <!-- Première partie -->

        <div class="interface">
            <div class="ensemble">
                <div class="titre">
                    <h1>Casio</h1>
                </div>
                <div class="rectangle"></div>
                <div class="titre2">
                    <p>MS-80E</p>
                </div>
            </div>
            <form>
                <input type="number" size=50 style="height:56px;width:240px">
            </form>
        </div>

        <!-- Première partie -->

        <!-- Seconde partie -->

<div class="boutons">
            <div class="grid">

            <button>OFF</button>
            <button>+/-</button>
            <button>%</button>
            <button style="background-color: lightgray;">Local</button>
            <button style="background-color: lightgray;">Euro</button>

            </div>

            <div class="grid2">

            <button>MC</button>
            <button>MR</button>
            <button>M-</button>
            <button>M+</button>
            <button>/</button>
            <button></button>
            <button style="background-color: black;">7</button>
            <button style="background-color: black;">8</button>
            <button style="background-color: black;">9</button>
            <button>x</button>
            <button style="background-color: goldenrod;">C</button>
            <button style="background-color: black;">4</button>
            <button style="background-color: black;">5</button>
            <button style="background-color: black;">6</button>
            <button>-</button>
            <button style="background-color: goldenrod;">AC</button>
            <button style="background-color: black;">1</button>
            <button style="background-color: black;">2</button>
            <button style="background-color: black;">3</button>
            <button style="height: 7.3vh;">+</button>
            <button style="background-color: black;">0</button>
            <button style="background-color: black;">00</button>
            <button style="background-color: black;">.</button>
            <button>=</button>

            </div>

        </div>

            <!-- Seconde partie -->

    </div>

</body>
</html>
